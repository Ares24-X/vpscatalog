baseURL = "https://vpscatalog.com"
languageCode = "en-US"
title = "VPS Catalog - Find the Best VPS Hosting for Your Needs"
theme = "vpsthemes"

# SEO
[params]
  description = "Independent VPS hosting reviews, comparisons, and recommendations. We've tested 15+ providers to help you choose the perfect plan."
  author = "VPS Catalog Team"
  contact = "hello@vpscatalog.com"
  og_image = "/images/og-default.png"
  twitter_site = "@vpscatalog"

# Performance
[outputs]
  home = ["HTML"]
  section = ["HTML", "RSS"]

# Taxonomies - only use tags, remove categories noise
[taxonomies]
  tag = "tags"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3

[build]
  writeStats = true

# RSS
[rss]
  limit = 20

# Sitemap
[sitemap]
  changefreq = "weekly"
  priority = 0.8
  filename = "sitemap.xml"

[mediaTypes]
  [mediaTypes."text/netlify"]
    suffix = "json"
    delimiter = ""

# Privacy - disable Google Analytics initially, add later
[privacy]
  [privacy.googleAnalytics]
    enable = false
  [privacy.x]
    enable = false
